<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Simulador de Financiamento</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: linear-gradient(135deg, #1e1e2f, #2b5876);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        color: white;
    }

    .container {
        background: #111;
        padding: 30px;
        border-radius: 15px;
        width: 350px;
        box-shadow: 0 0 20px rgba(0,0,0,0.6);
    }

    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    input {
        width: 100%;
        padding: 10px;
        margin: 8px 0;
        border-radius: 8px;
        border: none;
        outline: none;
    }

    button {
        width: 100%;
        padding: 12px;
        margin-top: 15px;
        border-radius: 8px;
        border: none;
        background: #00c6ff;
        color: white;
        font-weight: bold;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #0072ff;
    }

    .resultado {
        margin-top: 20px;
        padding: 15px;
        background: #222;
        border-radius: 10px;
    }
</style>
</head>
<body>

<div class="container">
    <h2>Simulador de Financiamento</h2>

    <label>Valor do Veículo (R$)</label>
    <!-- use text fields to allow formatting with dots/commas -->
    <input type="text" id="valor" placeholder="0,00">

    <label>Entrada (R$)</label>
    <input type="text" id="entrada" placeholder="0,00">

    <label>Taxa de Juros (% ao mês)</label>
    <input type="number" id="juros" step="0.01" min="0" placeholder="0">

    <label>Número de Parcelas</label>
    <input type="number" id="parcelas" min="1" placeholder="0">

    <button onclick="calcular()">Calcular</button>

    <div class="resultado" id="resultado"></div>
</div>

<script>
function formatarMoeda(input) {
    // remove everything that is not a digit
    let valor = input.value.replace(/\D/g, "");
    if (valor === "") {
        input.value = "";
        return;
    }
    valor = (parseFloat(valor) / 100).toFixed(2) + "";
    valor = valor.replace(".", ",");
    valor = valor.replace(/\B(?=(\d{3})+(?!\d))/g, ".");
    input.value = valor;
}

function converterParaNumero(valorFormatado) {
    return parseFloat(
        valorFormatado
        .replace(/\./g, "")
        .replace(",", ".")
    );
}

document.getElementById("valor").addEventListener("input", function() {
    formatarMoeda(this);
});

document.getElementById("entrada").addEventListener("input", function() {
    formatarMoeda(this);
});

function calcular() {
    let valor = converterParaNumero(document.getElementById("valor").value);
    let entrada = converterParaNumero(document.getElementById("entrada").value) || 0;
    let jurosRaw = document.getElementById("juros").value;
    let juros = jurosRaw === "" ? NaN : parseFloat(jurosRaw) / 100;
    let parcelas = parseInt(document.getElementById("parcelas").value, 10);

    // basic validation: use isNaN and ensure positive numbers
    if (isNaN(valor) || valor <= 0 || isNaN(juros) || juros < 0 || isNaN(parcelas) || parcelas <= 0) {
        document.getElementById("resultado").innerHTML = "Preencha todos os campos corretamente!";
        return;
    }

    let valorFinanciado = valor - entrada;

    let parcela;
    if (juros === 0) {
        // mensalidade simples se juros zero
        parcela = valorFinanciado / parcelas;
    } else {
        parcela = (valorFinanciado * juros) / (1 - Math.pow(1 + juros, -parcelas));
    }
    let totalPago = parcela * parcelas;

    document.getElementById("resultado").innerHTML = `
        <strong>Valor Financiado:</strong> R$ ${valorFinanciado.toLocaleString('pt-BR', {minimumFractionDigits: 2})} <br>
        <strong>Valor da Parcela:</strong> R$ ${parcela.toLocaleString('pt-BR', {minimumFractionDigits: 2})} <br>
        <strong>Total Pago:</strong> R$ ${totalPago.toLocaleString('pt-BR', {minimumFractionDigits: 2})}
    `;
}
</script>

</body>
</html>
