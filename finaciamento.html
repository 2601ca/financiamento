<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador de Financiamento</title>

<style>
:root {
    --bg-1: #0f172a;
    --bg-2: #1d4ed8;
    --card: rgba(15, 23, 42, 0.85);
    --text: #e2e8f0;
    --text-soft: #94a3b8;
    --accent: #22d3ee;
    --accent-strong: #06b6d4;
    --danger: #f87171;
    --ok: #4ade80;
    --border: rgba(148, 163, 184, 0.25);
}

* { box-sizing: border-box; }

body {
    font-family: "Inter", Arial, sans-serif;
    background: radial-gradient(circle at top, #1e3a8a 0%, var(--bg-1) 50%);
    min-height: 100vh;
    margin: 0;
    display: grid;
    place-items: center;
    padding: 20px;
    color: var(--text);
}

.container {
    width: 100%;
    max-width: 520px;
    background: var(--card);
    backdrop-filter: blur(15px);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 24px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

h1 {
    text-align: center;
    margin-bottom: 10px;
}

.subtitle {
    text-align: center;
    color: var(--text-soft);
    margin-bottom: 20px;
    font-size: 0.9rem;
}

.grid {
    display: grid;
    gap: 12px;
    grid-template-columns: repeat(2, 1fr);
}

.field.full {
    grid-column: 1 / -1;
}

label {
    font-size: 0.85rem;
    color: var(--text-soft);
}

input {
    padding: 12px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(15,23,42,0.6);
    color: var(--text);
    font-size: 1rem;
}

input:focus {
    border-color: var(--accent);
    outline: none;
    box-shadow: 0 0 0 3px rgba(34,211,238,0.2);
}

.actions {
    display: flex;
    gap: 10px;
    margin-top: 18px;
}

button {
    flex: 1;
    padding: 12px;
    border-radius: 10px;
    font-weight: bold;
    border: none;
    cursor: pointer;
}

.btn-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-strong));
    color: #06222b;
}

.btn-secondary {
    background: rgba(148,163,184,0.18);
    color: var(--text);
    border: 1px solid var(--border);
}

.resultado {
    margin-top: 18px;
    padding: 14px;
    border-radius: 12px;
    background: rgba(2,6,23,0.5);
    border: 1px solid var(--border);
    min-height: 60px;
}

.resultado-item {
    display: flex;
    justify-content: space-between;
    margin-bottom: 8px;
}

.resultado-item span {
    color: var(--text-soft);
}

.resultado-item strong {
    color: var(--ok);
}

.erro {
    color: var(--danger);
    font-weight: bold;
}

@media (max-width:520px){
    .grid { grid-template-columns: 1fr; }
}
</style>
</head>

<body>

<div class="container">
    <h1>Simulador de Financiamento</h1>
    <p class="subtitle">Descubra o valor real do seu financiamento</p>

    <form id="form" novalidate>

        <div class="grid">
            <div class="field full">
                <label>Valor do Veículo (R$)</label>
                <input type="text" id="valor" placeholder="0,00" required>
            </div>

            <div class="field full">
                <label>Entrada (R$)</label>
                <input type="text" id="entrada" placeholder="0,00">
            </div>

            <div class="field">
                <label>Juros (% ao mês)</label>
                <input type="text" id="juros" placeholder="Ex: 1,49" required>
            </div>

            <div class="field">
                <label>Parcelas</label>
                <input type="number" id="parcelas" min="1" required>
            </div>
        </div>

        <div class="actions">
            <button type="submit" class="btn-primary">Calcular</button>
            <button type="button" class="btn-secondary" id="limpar">Limpar</button>
        </div>
    </form>

    <div class="resultado" id="resultado">
        <span class="subtitle">Preencha os campos para simular.</span>
    </div>
</div>

<script>
const valorInput = document.getElementById("valor");
const entradaInput = document.getElementById("entrada");
const jurosInput = document.getElementById("juros");
const parcelasInput = document.getElementById("parcelas");
const resultado = document.getElementById("resultado");
const form = document.getElementById("form");
const limparBtn = document.getElementById("limpar");

function formatarMoeda(input){
    let numeros = input.value.replace(/\D/g,"");
    if(!numeros){ input.value=""; return; }
    let valor = (Number(numeros)/100).toFixed(2);
    input.value = valor.replace(".",",").replace(/\B(?=(\d{3})+(?!\d))/g,".");
}

function converter(valor){
    if(!valor) return 0;
    return Number(valor.replace(/\./g,"").replace(",","."));
}

function moedaBR(valor){
    return valor.toLocaleString("pt-BR",{style:"currency",currency:"BRL"});
}

function mostrarErro(msg){
    resultado.innerHTML = `<div class="erro">${msg}</div>`;
}

function calcular(e){
    e.preventDefault();

    const valor = converter(valorInput.value);
    const entrada = converter(entradaInput.value);
    const juros = Number(jurosInput.value.replace(",", ".")) / 100;
    const parcelas = parseInt(parcelasInput.value);

    if(valor <= 0) return mostrarErro("Informe um valor válido.");
    if(entrada < 0 || entrada > valor) return mostrarErro("Entrada inválida.");
    if(isNaN(juros) || juros < 0) return mostrarErro("Juros inválido.");
    if(!parcelas || parcelas <= 0) return mostrarErro("Parcelas inválidas.");

    const financiado = valor - entrada;

    if(financiado === 0){
        resultado.innerHTML = `<div class="resultado-item"><strong>Entrada cobre 100% do veículo.</strong></div>`;
        return;
    }

    const parcela = juros === 0
        ? financiado / parcelas
        : (financiado * juros) / (1 - Math.pow(1 + juros, -parcelas));

    const totalPago = parcela * parcelas;
    const totalJuros = totalPago - financiado;

    resultado.innerHTML = `
        <div class="resultado-item"><span>Valor financiado:</span><strong>${moedaBR(financiado)}</strong></div>
        <div class="resultado-item"><span>Parcela estimada:</span><strong>${moedaBR(parcela)}</strong></div>
        <div class="resultado-item"><span>Total pago:</span><strong>${moedaBR(totalPago)}</strong></div>
        <div class="resultado-item"><span>Total em juros:</span><strong>${moedaBR(totalJuros)}</strong></div>
    `;
}

[valorInput, entradaInput].forEach(i=>{
    i.addEventListener("input",()=>formatarMoeda(i));
});

form.addEventListener("submit",calcular);

limparBtn.addEventListener("click",()=>{
    form.reset();
    resultado.innerHTML = `<span class="subtitle">Preencha os campos para simular.</span>`;
});
</script>

</body>
</html>
